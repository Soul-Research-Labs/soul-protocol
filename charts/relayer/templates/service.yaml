apiVersion: v1
kind: Service
metadata:
  name: {{ include "relayer.fullname" . }}
  labels: {{- include "relayer.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - name: metrics
      port: {{ .Values.metrics.port }}
      targetPort: metrics
      protocol: TCP
  selector:
    app.kubernetes.io/name: {{ include "relayer.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
---
{{- if .Values.serviceAccount.create }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "relayer.serviceAccountName" . }}
  labels: {{- include "relayer.labels" . | nindent 4 }}
{{- end }}
---
{{- if .Values.metrics.serviceMonitor.enabled }}
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: {{ include "relayer.fullname" . }}
  labels: {{- include "relayer.labels" . | nindent 4 }}
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "relayer.name" . }}
      app.kubernetes.io/instance: {{ .Release.Name }}
  endpoints:
    - port: metrics
      interval: 15s
{{- end }}
