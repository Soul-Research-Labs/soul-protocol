version: "3.9"

services:
  relayer:
    build: .
    ports:
      - "9090:9090"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      # REDIS_PASSWORD must be set in .env; no default — operators who forget
      # will see an immediate auth failure rather than a silently-open cache.
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379
      - LOG_LEVEL=info
      - CHAINS=ethereum,arbitrum,optimism,base,aztec
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    # Bind to loopback only. The relayer container reaches redis via the
    # compose network alias; exposing 6379 on all interfaces would leak
    # nonce/replay-protection state to any co-tenant on the host.
    ports:
      - "127.0.0.1:6379:6379"
    command:
      - "redis-server"
      - "--requirepass"
      - "${REDIS_PASSWORD:?REDIS_PASSWORD must be set}"
      - "--protected-mode"
      - "yes"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "sh", "-c", "redis-cli -a \"$$REDIS_PASSWORD\" ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD:?REDIS_PASSWORD must be set}
    restart: unless-stopped

volumes:
  redis-data:
