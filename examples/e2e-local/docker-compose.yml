# Local end-to-end harness
#
# Spins up two anvil chains (L1 + L2), a Redis, and the relayer, so you can
# exercise the full ZASEON flow without touching testnets.
#
# Usage:
#   docker compose -f examples/e2e-local/docker-compose.yml up
#   make -C examples/e2e-local e2e
version: "3.9"

services:
  anvil-l1:
    image: ghcr.io/foundry-rs/foundry:latest
    entrypoint: >
      anvil --host 0.0.0.0 --chain-id 31337 --port 8545
      --mnemonic "test test test test test test test test test test test junk"
    ports: ["8545:8545"]
    healthcheck:
      test:
        ["CMD", "cast", "block-number", "--rpc-url", "http://localhost:8545"]
      interval: 2s
      retries: 30

  anvil-l2a:
    image: ghcr.io/foundry-rs/foundry:latest
    entrypoint: >
      anvil --host 0.0.0.0 --chain-id 42161 --port 8545
      --mnemonic "test test test test test test test test test test test junk"
    ports: ["8546:8545"]

  anvil-l2b:
    image: ghcr.io/foundry-rs/foundry:latest
    entrypoint: >
      anvil --host 0.0.0.0 --chain-id 10 --port 8545
      --mnemonic "test test test test test test test test test test test junk"
    ports: ["8547:8545"]

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]

  relayer:
    build:
      context: ../..
      dockerfile: relayer/Dockerfile
    environment:
      L1_RPC_URL: http://anvil-l1:8545
      L2_RPC_URLS: arbitrum=http://anvil-l2a:8545,optimism=http://anvil-l2b:8545
      RELAYER_PRIVATE_KEY: 0xac0974bec39a17e36ba4a6b4d238ff944bacb478cbed5efcae784d7bf4f2ff80
      PROOF_QUEUE_REDIS_URL: redis://redis:6379
      METRICS_PORT: "9100"
    ports: ["9100:9100"]
    depends_on:
      anvil-l1: { condition: service_healthy }
      anvil-l2a: { condition: service_started }
      anvil-l2b: { condition: service_started }
      redis: { condition: service_started }
