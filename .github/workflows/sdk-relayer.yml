name: SDK & Relayer CI

permissions:
  contents: read

on:
  push:
    branches: [main, develop]
    paths:
      - "sdk/**"
      - "relayer/**"
  pull_request:
    branches: [main, develop]
    paths:
      - "sdk/**"
      - "relayer/**"

concurrency:
  group: sdk-relayer-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "20"

jobs:
  sdk-build-test:
    name: SDK Build & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdk
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: sdk/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Build SDK
        run: npm run build

      - name: Run tests
        run: npm test

  relayer-build-test:
    name: Relayer Build & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: relayer
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: relayer/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Run tests
        run: npm test
